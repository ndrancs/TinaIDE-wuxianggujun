name: PR APK Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-apk-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  TS_CLI_BUILD_FROM_SOURCE: 'false'
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install CMake
        run: sdkmanager --install "cmake;3.22.1"

      - name: Install tree-sitter CLI (npm)
        run: npm install -g tree-sitter-cli@0.22.1

      - name: Setup tree-sitter grammar dependencies
        run: |
          cd external/tina-android-tree-sitter/grammars/cpp
          mkdir -p node_modules
          ln -sf ../../c node_modules/tree-sitter-c
          echo "Created symlink for tree-sitter-cpp:"
          ls -la node_modules/

          cd ../toml
          npm install --ignore-scripts regexp-util
          echo "Installed regexp-util for tree-sitter-toml"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APKs
        run: |
          ./gradlew :app:assembleDebugAllAbi --no-daemon \
            -Dorg.gradle.internal.http.connectionTimeout=120000 \
            -Dorg.gradle.internal.http.socketTimeout=120000 \
            -Dorg.gradle.internal.repository.max.retries=4

      - name: List generated APKs
        run: |
          echo "Generated APK files:"
          if [ -d "app/build/outputs/apk" ]; then
            find app/build/outputs/apk -name "*.apk" -type f | while read apk; do
              size=$(du -h "$apk" | cut -f1)
              echo "  - $apk ($size)"
            done
          else
            echo "  (no APK output dir: app/build/outputs/apk)"
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/**/*.apk
          retention-days: 7
          if-no-files-found: error
